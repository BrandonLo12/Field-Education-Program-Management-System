<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard — Field Education Program</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

  <!-- Top Navigation Bar -->
  <header class="bg-gradient-to-r from-indigo-700 to-violet-700 shadow-lg sticky top-0 z-50 h-16">
    <div class="max-w-full px-6 h-full flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-semibold text-sm leading-tight">Field Education Program</p>
          <p class="text-indigo-200 text-xs">Student Portal</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <p class="text-indigo-200 text-xs hidden sm:block" id="nav-date"></p>
        <div id="avatar"
          class="w-9 h-9 rounded-full bg-white/20 border-2 border-white/30 flex items-center justify-center text-white font-bold text-sm cursor-default select-none">
        </div>
      </div>
    </div>
  </header>

  <!-- Page body: sidebar + content -->
  <div class="flex" style="min-height: calc(100vh - 4rem);">

    <!-- ── Left Sidebar ──────────────────────────────────────────────────── -->
    <aside class="w-72 bg-white border-r border-slate-100 flex-shrink-0 sticky top-16 h-[calc(100vh-4rem)] flex flex-col overflow-y-auto">
      <div class="p-5 flex-1">

        <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-4 px-2">Navigation</p>

        <nav class="space-y-2">

          <!-- Home tab -->
          <button class="std-tab std-active w-full" data-tab="home">
            <div class="std-icon-wrap std-icon-active">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
              </svg>
            </div>
            <div class="text-left">
              <p class="std-label">Home</p>
              <p class="std-sub">Overview &amp; placement</p>
            </div>
          </button>

          <!-- Profile tab -->
          <button class="std-tab w-full" data-tab="profile">
            <div class="std-icon-wrap std-icon-inactive">
              <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <div class="text-left">
              <p class="std-label">Profile</p>
              <p class="std-sub">Personal information</p>
            </div>
          </button>

          <!-- Academic Information tab -->
          <button class="std-tab w-full" data-tab="academic">
            <div class="std-icon-wrap std-icon-inactive">
              <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            </div>
            <div class="text-left">
              <p class="std-label">Academic Info</p>
              <p class="std-sub">Cohort, calendar &amp; hours</p>
            </div>
          </button>

        </nav>
      </div>

      <!-- Sidebar footer -->
      <div class="p-5 border-t border-slate-100">
        <p class="text-xs text-slate-400 text-center">&copy; <span id="footer-year"></span> Field Education Program</p>
      </div>
    </aside>

    <!-- ── Main Content ──────────────────────────────────────────────────── -->
    <main class="flex-1 min-w-0 px-8 py-8 space-y-6 overflow-x-hidden">

      <!-- Page heading (updates on tab switch) -->
      <div>
        <h1 class="text-2xl font-bold text-slate-800" id="page-heading">Home</h1>
        <p class="text-slate-500 text-sm mt-1" id="page-subheading">Your placement overview and status.</p>
      </div>

      <!-- ── Home Tab ──────────────────────────────────────────────────── -->
      <div id="tab-home" class="space-y-6">

        <!-- Welcome Banner -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
          <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
              <p class="text-slate-400 text-sm font-medium">Welcome back,</p>
              <h2 class="text-2xl font-bold text-slate-800 mt-0.5" id="student-name">—</h2>
              <p class="text-slate-500 text-sm mt-1" id="student-meta">—</p>
            </div>
            <div id="status-badge"></div>
          </div>
        </div>

        <!-- Placement Status + Agency -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Placement Status card -->
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-5 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
              <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <h2 class="font-semibold text-slate-700 text-sm">Placement Status</h2>
            </div>
            <div class="px-5 py-4 space-y-0 divide-y divide-slate-50" id="placement-status-info"></div>
          </div>

          <!-- Agency Assignment card -->
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-5 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
              <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
              </div>
              <h2 class="font-semibold text-slate-700 text-sm">Agency Assignment</h2>
            </div>
            <div class="px-5 py-4 space-y-0 divide-y divide-slate-50" id="agency-info"></div>
          </div>

        </div>
      </div>

      <!-- ── Profile Tab ───────────────────────────────────────────────── -->
      <div id="tab-profile" class="hidden space-y-6">

        <!-- Personal Information -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-5 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
            <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <h2 class="font-semibold text-slate-700 text-sm">Personal Information</h2>
          </div>
          <div class="px-5 py-4 space-y-0 divide-y divide-slate-50" id="personal-info"></div>
        </div>

      </div>

      <!-- ── Academic Information Tab ──────────────────────────────────── -->
      <div id="tab-academic" class="hidden space-y-6">

        <!-- Cohort Information -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-5 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
            <div class="w-8 h-8 rounded-lg bg-violet-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </div>
            <h2 class="font-semibold text-slate-700 text-sm">Cohort Information</h2>
          </div>
          <div class="px-5 py-4 space-y-0 divide-y divide-slate-50" id="cohort-info"></div>
        </div>

        <!-- Calendar + Hours -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

          <!-- Fieldwork Calendar -->
          <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
              <div class="w-8 h-8 rounded-lg bg-sky-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-sky-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <h2 class="font-semibold text-slate-700 text-sm">Fieldwork Calendar</h2>
            </div>
            <div class="p-6" id="calendar-section"></div>
          </div>

          <!-- Hours Tracker -->
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
              <div class="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <h2 class="font-semibold text-slate-700 text-sm">Hours Completed</h2>
            </div>
            <div class="p-6" id="hours-section"></div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
