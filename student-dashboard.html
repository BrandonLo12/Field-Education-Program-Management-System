<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard — Field Education Program</title>
  <script src="auth.js"></script>
  <script>requireAuth("student");</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Hanken Grotesk", "system-ui", "sans-serif"] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

  <!-- Top Navigation Bar -->
  <header class="sticky top-0 z-50 h-16 flex">
    <!-- Left: orange (UOP brand), aligned with sidebar -->
    <div id="header-left" class="w-72 flex-shrink-0 bg-[#F05A22] flex items-center pl-[2.375rem] pr-4">
      <button id="sidebar-toggle" class="w-12 h-12 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors flex-shrink-0" title="Toggle sidebar" aria-label="Toggle sidebar">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
    <!-- Right: light, aligned with main content -->
    <div id="header-right" class="flex-1 bg-slate-50 flex items-center justify-end gap-2 px-6">

      <!-- Notification Bell -->
      <div class="relative" id="notif-wrap">
        <button id="notif-btn" onclick="toggleNotifications()"
          class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-200/60 transition-colors relative">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
        <div id="notif-dropdown" class="hidden absolute right-0 top-full mt-2 w-80 bg-white rounded-2xl shadow-xl border border-slate-100 py-2 z-[60]">
          <div class="px-4 py-2.5 border-b border-slate-100">
            <p class="font-semibold text-sm text-slate-800">Notifications</p>
          </div>
          <div class="px-4 py-8 text-center">
            <p class="text-sm text-slate-400">No new notifications</p>
          </div>
        </div>
      </div>

      <div class="relative" id="avatar-menu-wrap">
          <button id="avatar" onclick="toggleAvatarDropdown()"
            class="w-10 h-10 rounded-full bg-[#F05A22] border-2 border-[#F05A22]/50 flex items-center justify-center text-white font-bold text-sm cursor-pointer select-none hover:bg-[#C44A1C] transition-colors"
            aria-label="User menu" aria-haspopup="true"></button>

          <!-- Dropdown -->
          <div id="avatar-dropdown"
            class="hidden absolute right-0 top-full mt-2 w-52 bg-white rounded-2xl shadow-xl border border-slate-100 py-2 z-[60]"
            role="menu">
            <div class="px-4 py-3 border-b border-slate-100">
              <p class="text-sm font-semibold text-slate-800" id="avatar-user-name"></p>
              <p class="text-xs text-slate-500 mt-0.5">Student</p>
            </div>
            <button onclick="switchStudentTab('profile'); document.getElementById('avatar-dropdown').classList.add('hidden')"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors text-left">
              <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              Profile
            </button>
            <button onclick="openSettings()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors text-left">
              <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Settings
            </button>
            <div class="my-1.5 h-px bg-slate-100 mx-3"></div>
            <div class="px-4 py-1.5">
              <p class="text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Appearance</p>
              <div class="flex gap-1.5">
                <button data-theme="light" onclick="applyTheme('light')"
                  class="theme-option flex-1 py-1.5 text-xs font-medium rounded-lg border-2 transition-all">Light</button>
                <button data-theme="dark" onclick="applyTheme('dark')"
                  class="theme-option flex-1 py-1.5 text-xs font-medium rounded-lg border-2 transition-all">Dark</button>
                <button data-theme="auto" onclick="applyTheme('auto')"
                  class="theme-option flex-1 py-1.5 text-xs font-medium rounded-lg border-2 transition-all">Auto</button>
              </div>
            </div>
            <div class="px-4 py-1.5">
              <p class="text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Text Size</p>
              <div class="flex gap-1.5">
                <button data-text-size="small" onclick="applyTextSize('small')" aria-label="Small text size"
                  class="text-size-option flex-1 py-1.5 rounded-lg border-2 transition-all flex items-center justify-center"><span class="text-xs font-bold leading-none">A</span></button>
                <button data-text-size="medium" onclick="applyTextSize('medium')" aria-label="Medium text size"
                  class="text-size-option flex-1 py-1.5 rounded-lg border-2 transition-all flex items-center justify-center"><span class="text-sm font-bold leading-none">A</span></button>
                <button data-text-size="large" onclick="applyTextSize('large')" aria-label="Large text size"
                  class="text-size-option flex-1 py-1.5 rounded-lg border-2 transition-all flex items-center justify-center"><span class="text-base font-bold leading-none">A</span></button>
              </div>
            </div>
            <div class="my-1.5 h-px bg-slate-100 mx-3"></div>
            <button onclick="handleExit()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition-colors text-left">
              <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
  </header>

  <!-- Page body: sidebar + content -->
  <div class="flex" style="min-height: calc(100vh - 4rem);">

    <!-- ── Left Sidebar ──────────────────────────────────────────────────── -->
    <aside class="w-72 bg-transparent border-r border-slate-200 flex-shrink-0 sticky top-16 h-[calc(100vh-4rem)] flex flex-col overflow-y-auto">
      <div class="p-5 flex-1">
        <nav class="space-y-2">

          <!-- Home tab -->
          <button class="std-tab std-active w-full" data-tab="home">
            <div class="std-icon-wrap std-icon-active">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
              </svg>
            </div>
            <p class="std-label">Home</p>
          </button>

          <!-- Checklist tab -->
          <button class="std-tab w-full" data-tab="checklist">
            <div class="std-icon-wrap std-icon-inactive">
              <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
              </svg>
            </div>
            <p class="std-label">Checklist</p>
          </button>

        </nav>
      </div>

    </aside>

    <!-- ── Main Content ──────────────────────────────────────────────────── -->
    <main class="flex-1 min-w-0 px-8 py-8 space-y-6 overflow-x-hidden bg-slate-50">

      <!-- Page heading (updates on tab switch) -->
      <div>
        <h1 class="text-3xl font-bold text-slate-800" id="page-heading">Welcome</h1>
      </div>

      <!-- ── Home Tab ──────────────────────────────────────────────────── -->
      <div id="tab-home" class="space-y-6">

        <!-- Placement Status + Location + Academic Contact -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

          <!-- Placement Status -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-4 pt-3 pb-2 flex items-center gap-2 border-b border-slate-50">
              <div class="w-6 h-6 rounded-md bg-emerald-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <h2 class="font-bold text-slate-900 text-base">Placement Status</h2>
            </div>
            <div class="px-4 py-1 divide-y divide-slate-50" id="home-placement-status"></div>
          </div>

          <!-- Location -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-4 pt-3 pb-2 flex items-center gap-2 border-b border-slate-50">
              <div class="w-6 h-6 rounded-md bg-orange-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <h2 class="font-bold text-slate-900 text-base">Location</h2>
            </div>
            <div class="px-4 py-1 divide-y divide-slate-50" id="home-location"></div>
          </div>

          <!-- Academic Contacts -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-4 pt-3 pb-2 flex items-center gap-2 border-b border-slate-50">
              <div class="w-6 h-6 rounded-md bg-sky-50 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-sky-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <h2 class="font-bold text-slate-900 text-base">Academic Contacts</h2>
            </div>
            <div class="px-4 py-1 divide-y divide-slate-50" id="home-academic-contact"></div>
          </div>

        </div>

        <!-- Field Calendar -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-6 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
            <div class="w-8 h-8 rounded-lg bg-sky-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 text-sky-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
            </div>
            <h2 class="font-bold text-slate-900 text-base">Field Calendar</h2>
          </div>
          <div class="p-6" id="home-calendar-section"></div>
        </div>

      </div>

      <!-- ── Checklist Tab ─────────────────────────────────────────────── -->
      <!-- Read-only: same workflow the coordinator/admin dashboards track,
           just no way here to check items off or add/delete notes. -->
      <div id="tab-checklist" class="hidden space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <div id="checklist-section"></div>
        </div>
      </div>

      <!-- ── Profile Tab ───────────────────────────────────────────────── -->
      <div id="tab-profile" class="hidden space-y-6">

        <!-- Personal Information -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-5 pt-5 pb-3 flex items-center gap-2.5 border-b border-slate-50">
            <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <h2 class="font-bold text-slate-900 text-base">Personal Information</h2>
          </div>
          <div class="px-5 py-4 space-y-0 divide-y divide-slate-50" id="personal-info"></div>
        </div>

      </div>

    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 z-[70] hidden">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeSettings()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm pointer-events-auto" role="dialog" aria-modal="true">
        <div class="px-6 pt-6 pb-4 border-b border-slate-100 flex items-center justify-between">
          <h3 class="text-lg font-bold text-slate-800">Settings</h3>
          <button onclick="closeSettings()" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="px-6 py-5 space-y-5">
          <div>
            <p class="text-xs font-bold text-slate-900 uppercase tracking-widest mb-3">Appearance</p>
            <div class="grid grid-cols-3 gap-2">
              <button data-theme="light" onclick="applyTheme('light')"
                class="theme-option py-4 rounded-xl border-2 text-xs font-medium transition-all flex flex-col items-center gap-1.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 6.343l-.707-.707m12.728 12.728l-.707-.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                Light
              </button>
              <button data-theme="dark" onclick="applyTheme('dark')"
                class="theme-option py-4 rounded-xl border-2 text-xs font-medium transition-all flex flex-col items-center gap-1.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                Dark
              </button>
              <button data-theme="auto" onclick="applyTheme('auto')"
                class="theme-option py-4 rounded-xl border-2 text-xs font-medium transition-all flex flex-col items-center gap-1.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
                </svg>
                Auto
              </button>
            </div>
          </div>
          <div class="border-t border-slate-100 pt-5">
            <p class="text-xs font-bold text-slate-900 uppercase tracking-widest mb-3">Text Size</p>
            <div class="grid grid-cols-3 gap-2">
              <button data-text-size="small" onclick="applyTextSize('small')" aria-label="Small text size"
                class="text-size-option py-5 rounded-xl border-2 transition-all flex items-center justify-center">
                <span class="text-sm font-bold leading-none">A</span>
              </button>
              <button data-text-size="medium" onclick="applyTextSize('medium')" aria-label="Medium text size"
                class="text-size-option py-5 rounded-xl border-2 transition-all flex items-center justify-center">
                <span class="text-lg font-bold leading-none">A</span>
              </button>
              <button data-text-size="large" onclick="applyTextSize('large')" aria-label="Large text size"
                class="text-size-option py-5 rounded-xl border-2 transition-all flex items-center justify-center">
                <span class="text-2xl font-bold leading-none">A</span>
              </button>
            </div>
          </div>
          <div class="border-t border-slate-100 pt-5">
            <p class="text-xs font-bold text-slate-900 uppercase tracking-widest mb-3">Notifications</p>
            <label class="flex items-center justify-between py-2 cursor-pointer">
              <span class="text-sm text-slate-700">Email reminders</span>
              <input type="checkbox" checked class="w-4 h-4 rounded accent-indigo-600 cursor-pointer">
            </label>
            <label class="flex items-center justify-between py-2 cursor-pointer">
              <span class="text-sm text-slate-700">Hours log alerts</span>
              <input type="checkbox" checked class="w-4 h-4 rounded accent-indigo-600 cursor-pointer">
            </label>
          </div>
        </div>
        <div class="px-6 pb-6">
          <button onclick="closeSettings()"
            class="w-full py-2.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl transition-colors">
            Done
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal — replaces window.confirm() so confirmation prompts
       match the app's look instead of the browser's native "localhost says"
       dialog. -->
  <div id="confirm-modal" class="fixed inset-0 z-[95] hidden">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="resolveConfirmDialog(false)"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm pointer-events-auto" role="alertdialog" aria-modal="true">
        <div class="px-6 pt-6 pb-2">
          <h3 id="confirm-modal-title" class="text-lg font-bold text-slate-800">Are you sure?</h3>
        </div>
        <div class="px-6 pb-5">
          <p id="confirm-modal-message" class="text-sm text-slate-500"></p>
        </div>
        <div class="px-6 pb-6 flex items-center justify-end gap-2">
          <button type="button" onclick="resolveConfirmDialog(false)" class="px-4 py-2 text-sm font-medium text-slate-500 hover:bg-slate-50 rounded-lg">Cancel</button>
          <button type="button" id="confirm-modal-confirm-btn" onclick="resolveConfirmDialog(true)" class="px-4 py-2 text-sm font-medium text-white rounded-lg shadow-sm">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Alert Modal — replaces window.alert() for the same reason. -->
  <div id="alert-modal" class="fixed inset-0 z-[95] hidden">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="resolveAlertDialog()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm pointer-events-auto" role="alertdialog" aria-modal="true">
        <div class="px-6 pt-6 pb-2">
          <h3 id="alert-modal-title" class="text-lg font-bold text-slate-800">Heads up</h3>
        </div>
        <div class="px-6 pb-5">
          <p id="alert-modal-message" class="text-sm text-slate-500"></p>
        </div>
        <div class="px-6 pb-6 flex items-center justify-end">
          <button type="button" id="alert-modal-ok-btn" onclick="resolveAlertDialog()" class="px-4 py-2 text-sm font-medium text-white rounded-lg shadow-sm">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="workflow-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
